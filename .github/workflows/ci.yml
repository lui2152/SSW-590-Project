name: FlashClash CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
        working-directory: app

      - name: Checking Security 
        run: npm audit --audit-level=high
        working-directory: app
      
      - name: Run tests
        run: npm test
        working-directory: app

      - name: Build Docker image
        run: docker build -t flashclash .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flashclash:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'